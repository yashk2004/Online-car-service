<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoCare — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080809;--surface:#111113;--surface2:#1a1a1e;--border:rgba(255,255,255,0.07);--accent:#e8473f;--accent2:#ff6b35;--gold:#c9a84c;--text:#f0ede8;--muted:#7a7875;--success:#3ecf8e}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
    body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(232,71,63,0.08) 0%,transparent 70%);pointer-events:none}
    .page{position:relative;z-index:1;width:100%;max-width:420px;padding:1.5rem}
    .logo{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:2rem}
    .logo-icon{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
    .logo-text{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--text)}
    .admin-tag{text-align:center;margin-bottom:2rem}
    .admin-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:0.15em;padding:5px 14px;border-radius:999px}
    .shield{width:12px;height:12px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;position:relative;overflow:hidden;animation:fadeUp 0.5s ease both}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--accent))}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:0.3rem}
    .card-sub{font-size:13px;color:var(--muted);margin-bottom:2rem}
    .alert-error{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:1.25rem;background:rgba(232,71,63,0.1);border:1px solid rgba(232,71,63,0.25);color:#f47c77}
    .form-group{margin-bottom:1.1rem}
    label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:6px}
    input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color 0.2s,background 0.2s}
    input:focus{border-color:var(--gold);background:rgba(201,168,76,0.04)}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;margin-top:0.75rem;background:linear-gradient(135deg,var(--gold),var(--accent2));color:white;border:none;border-radius:10px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s,transform 0.15s}
    .btn:hover{opacity:0.9;transform:translateY(-1px)}
    .hint{text-align:center;margin-top:1.5rem;font-size:12px;color:var(--muted)}
    .hint a{color:var(--muted2);text-decoration:none}
    .hint a:hover{color:var(--text)}
    .credentials-hint{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:1.25rem;line-height:1.6}
    .credentials-hint span{color:var(--gold);font-weight:500}
  </style>
</head>
<body>
<div class="page">
  <a href="/" class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
        <rect x="9" y="11" width="14" height="10" rx="2"/>
        <circle cx="12" cy="19" r="1"/><circle cx="20" cy="19" r="1"/>
      </svg>
    </div>
    <span class="logo-text">AutoCare</span>
  </a>

  <div class="admin-tag">
    <div class="admin-badge">
      <svg class="shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin Portal
    </div>
  </div>

  <div class="card">
    <div class="card-title">Admin Login</div>
    <div class="card-sub">Access the AutoCare admin dashboard</div>

    <div class="alert-error" th:if="${error}" th:text="${error}"></div>

    <div class="credentials-hint">
      Email: <span>admin@autocare.com</span><br/>
      Password: <span>admin123</span>
    </div>

    <form action="/admin/login" method="post">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" name="email" placeholder="admin@autocare.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" required/>
      </div>
      <button type="submit" class="btn">Login to Dashboard</button>
    </form>

    <div class="hint"><a href="/login">← Back to user login</a></div>
  </div>
</div>
</body>
</html>
