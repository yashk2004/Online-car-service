<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoCare — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #161618; --surface2: #1e1e21;
      --border: rgba(255,255,255,0.07); --accent: #e8473f; --accent2: #ff6b35;
      --gold: #c9a84c; --text: #f0ede8; --muted: #7a7875; --success: #3ecf8e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
    body::after { content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 700px; height: 500px; background: radial-gradient(ellipse, rgba(232,71,63,0.1) 0%, transparent 70%); pointer-events: none; }

    .page { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 1.5rem; }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 2.5rem; justify-content: center; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--text); }

    /* ── ROLE TOGGLE ── */
    .role-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 1.75rem; gap: 4px; }
    .role-btn { flex: 1; padding: 9px; border-radius: 9px; border: none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .role-btn.active-user { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .role-btn.active-admin { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
    .role-btn svg { flex-shrink: 0; }

    /* ── CARD ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; transition: background 0.3s; }
    .card.user-mode::before  { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .card.admin-mode::before { background: linear-gradient(90deg, var(--gold), var(--accent2)); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 1px; margin-bottom: 0.4rem; }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }

    /* admin hint box */
    .admin-hint { background: rgba(201,168,76,0.07); border: 1px solid rgba(201,168,76,0.18); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.6; display: none; }
    .admin-hint span { color: var(--gold); font-weight: 500; }
    .admin-hint.show { display: block; }

    .alert { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 1.25rem; }
    .alert-error   { background: rgba(232,71,63,0.1);  border: 1px solid rgba(232,71,63,0.3);  color: #f47c77; }
    .alert-success { background: rgba(62,207,142,0.1); border: 1px solid rgba(62,207,142,0.3); color: var(--success); }

    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 6px; }
    input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; outline: none; transition: border-color 0.2s, background 0.2s; }
    input:focus { border-color: var(--accent); background: rgba(232,71,63,0.05); }
    .admin-mode-active input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
    input::placeholder { color: var(--muted); }

    .btn { width: 100%; margin-top: 0.75rem; color: white; border: none; border-radius: 10px; padding: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .btn-user  { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .btn-admin { background: linear-gradient(135deg, var(--gold), var(--accent2)); }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: scale(0.99); }

    .switch { text-align: center; margin-top: 1.75rem; font-size: 13px; color: var(--muted); }
    .switch a { color: var(--accent2); text-decoration: none; font-weight: 500; }
    .switch a:hover { text-decoration: underline; }

    /* hidden form sections */
    #userSection, #adminSection { display: block; }
    #adminSection { display: none; }
  </style>
</head>
<body>
<div class="page">

  <a href="/" class="logo">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3"/>
        <rect x="9" y="11" width="14" height="10" rx="2"/>
        <circle cx="12" cy="19" r="1"/><circle cx="20" cy="19" r="1"/>
      </svg>
    </div>
    <span class="logo-text">AutoCare</span>
  </a>

  <!-- ROLE TOGGLE -->
  <div class="role-toggle">
    <button class="role-btn active-user" id="btnUser" onclick="switchRole('user')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      User Login
    </button>
    <button class="role-btn" id="btnAdmin" onclick="switchRole('admin')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin Login
    </button>
  </div>

  <!-- CARD -->
  <div class="card user-mode" id="mainCard">

    <!-- Alerts (from server) -->
    <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <!-- Admin hint -->
    <div class="admin-hint" id="adminHint">
      Use: <span>admin@autocare.com</span> / <span>admin123</span>
    </div>

    <!-- USER SECTION -->
    <div id="userSection">
      <div class="card-title">Welcome Back</div>
      <div class="card-sub">Log in to manage your bookings</div>
      <form action="/login" method="post">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required/>
        </div>
        <button type="submit" class="btn btn-user">Log In</button>
      </form>
      <div class="switch">Don't have an account? <a href="/signup">Sign up free</a></div>
    </div>

    <!-- ADMIN SECTION -->
    <div id="adminSection">
      <div class="card-title">Admin Login</div>
      <div class="card-sub">Access the AutoCare admin dashboard</div>
      <form action="/admin/login" method="post">
        <div class="form-group">
          <label for="adminEmail">Admin Email</label>
          <input type="email" id="adminEmail" name="email" placeholder="admin@autocare.com"/>
        </div>
        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" name="password" placeholder="Enter admin password"/>
        </div>
        <button type="submit" class="btn btn-admin">Login as Admin</button>
      </form>
      <div class="switch"><a href="/login">← Back to user login</a></div>
    </div>

  </div>
</div>

<script>
  function switchRole(role) {
    const card       = document.getElementById('mainCard');
    const userSec    = document.getElementById('userSection');
    const adminSec   = document.getElementById('adminSection');
    const btnUser    = document.getElementById('btnUser');
    const btnAdmin   = document.getElementById('btnAdmin');
    const adminHint  = document.getElementById('adminHint');

    if (role === 'admin') {
      userSec.style.display  = 'none';
      adminSec.style.display = 'block';
      adminHint.classList.add('show');
      card.classList.remove('user-mode');
      card.classList.add('admin-mode');
      btnAdmin.classList.add('active-admin');
      btnAdmin.classList.remove('active-user');
      btnUser.classList.remove('active-user');
      btnUser.classList.remove('active-admin');
    } else {
      userSec.style.display  = 'block';
      adminSec.style.display = 'none';
      adminHint.classList.remove('show');
      card.classList.add('user-mode');
      card.classList.remove('admin-mode');
      btnUser.classList.add('active-user');
      btnUser.classList.remove('active-admin');
      btnAdmin.classList.remove('active-admin');
      btnAdmin.classList.remove('active-user');
    }
  }
</script>
</body>
</html>
